<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>法律文书 RAG 系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#1a1d2e;height:100vh;display:flex}
.sidebar{width:260px;background:#1e2235;color:#c8cce0;display:flex;flex-direction:column;padding:20px 16px}
.sidebar h1{font-size:1.1rem;color:#fff;margin-bottom:20px}
.upload-zone{border:2px dashed rgba(255,255,255,.15);border-radius:6px;padding:16px;text-align:center;cursor:pointer;font-size:.85rem;margin-bottom:16px}
.upload-zone:hover{border-color:#4f6ef7;background:rgba(79,110,247,.08)}
.doc-list{flex:1;overflow-y:auto;font-size:.82rem}
.doc-item{display:flex;justify-content:space-between;padding:8px 10px;border-radius:4px;margin-bottom:4px}
.doc-item:hover{background:#2a2f45}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:16px 24px;border-bottom:1px solid #e5e7eb;background:#fff}
.header h2{font-size:1rem}
.chat-area{flex:1;overflow-y:auto;padding:20px 24px}
.message{max-width:750px;margin-bottom:20px}
.message.user{margin-left:auto}
.message.user .bubble{background:#4f6ef7;color:#fff;border-radius:12px 12px 4px 12px}
.message.assistant .bubble{background:#fff;border:1px solid #e5e7eb;border-radius:12px 12px 12px 4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.label{font-size:.72rem;color:#6b7280;margin-bottom:4px;padding:0 4px}
.bubble{padding:12px 16px;line-height:1.65;font-size:.9rem}
.bubble p{margin-bottom:6px}
.citations{margin-top:10px;padding-top:8px;border-top:1px solid #e5e7eb}
.citations summary{font-size:.78rem;color:#6b7280;cursor:pointer}
.cite-item{padding:6px 8px;margin-top:4px;background:#f5f6f8;border-radius:4px;font-size:.78rem}
.cite-item .article{color:#4f6ef7;font-weight:600}
.input-area{padding:16px 24px;border-top:1px solid #e5e7eb;background:#fff;display:flex;gap:10px}
.input-area textarea{flex:1;resize:none;padding:10px 14px;border:1px solid #d1d5db;border-radius:6px;font-size:.9rem;outline:none;min-height:42px;max-height:120px}
.input-area textarea:focus{border-color:#4f6ef7}
.input-area button{width:42px;height:42px;border-radius:6px;background:#4f6ef7;color:#fff;border:none;cursor:pointer}
.empty-state{text-align:center;padding:60px 20px;color:#9ca3af}
</style>
</head>
<body>
<div class="sidebar">
  <h1>法律文书 RAG</h1>
  <div class="upload-zone" id="uploadZone" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
    <div>点击或拖拽上传</div>
    <div style="opacity:.5;margin-top:4px">PDF / DOCX / TXT</div>
  </div>
  <div style="font-size:.72rem;color:#6b7280;margin-bottom:8px">已上传文档</div>
  <div class="doc-list" id="docList">
    <div style="opacity:.5;font-size:.78rem">暂无文档</div>
  </div>
</div>
<div class="main">
  <div class="header"><h2>法律咨询</h2></div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state">上传法律文书后，在这里提问</div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入你的法律问题..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button onclick="send()">发送</button>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8002";

async function upload(file) {
  const form = new FormData();
  form.append("file", file);
  const res = await fetch(API + "/api/documents/upload", {method:"POST", body:form});
  const data = await res.json();
  if (res.ok) {
    alert(data.message);
    loadDocs();
  } else {
    alert(data.detail || "上传失败");
  }
}

function handleDrop(e) {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) upload(f);
}

document.getElementById("uploadZone").onclick = () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".pdf,.docx,.txt";
  input.onchange = () => { if(input.files[0]) upload(input.files[0]); };
  input.click();
};

async function loadDocs() {
  const res = await fetch(API + "/api/documents/upload").catch(() => null);
  // 由你自己实现文档列表 API
}

let loading = false;
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = ""; loading = true;

  const area = document.getElementById("chatArea");
  const empty = area.querySelector(".empty-state");
  if (empty) empty.remove();

  // 用户消息
  const userDiv = document.createElement("div");
  userDiv.className = "message user";
  userDiv.innerHTML = '<div class="label">我</div><div class="bubble">' + text + '</div>';
  area.appendChild(userDiv);

  // 加载中
  const loadDiv = document.createElement("div");
  loadDiv.className = "message assistant";
  loadDiv.id = "loading";
  loadDiv.innerHTML = '<div class="label">助手</div><div class="bubble">思考中...</div>';
  area.appendChild(loadDiv);
  area.scrollTop = area.scrollHeight;

  try {
    const res = await fetch(API + "/api/chat/", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:text})
    });
    const data = await res.json();
    document.getElementById("loading").remove();

    const div = document.createElement("div");
    div.className = "message assistant";
    let html = '<div class="label">助手</div><div class="bubble">' + data.answer + '</div>';

    if (data.sources && data.sources.length > 0) {
      html += '<details class="citations"><summary>引用来源 (' + data.sources.length + '条)</summary>';
      data.sources.forEach(s => {
        html += '<div class="cite-item">';
        if (s.article) html += '<span class="article">' + s.article + '</span> ';
        html += s.content.substring(0, 150) + '...</div>';
      });
      html += '</details>';
    }

    div.innerHTML = html;
    area.appendChild(div);
  } catch(e) {
    document.getElementById("loading").remove();
    const div = document.createElement("div");
    div.className = "message assistant";
    div.innerHTML = '<div class="label">助手</div><div class="bubble">请求失败: ' + e.message + '</div>';
    area.appendChild(div);
  }
  area.scrollTop = area.scrollHeight;
  loading = false;
}
</script>
</body>
</html>
